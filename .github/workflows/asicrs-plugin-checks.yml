name: asicrs Plugin Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/asicrs-plugin-checks.yml"
      - "plugin/asicrs/**"
      - "sdk/rust/**"
      - "server/sdk/v1/pb/driver.proto"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/asicrs
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt --component clippy --allow-downgrade
          rustup override set nightly

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            plugin/asicrs/target
          key: ${{ runner.os }}-asicrs-${{ hashFiles('plugin/asicrs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-asicrs-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  rust-build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [rust-lint]
    defaults:
      run:
        working-directory: plugin/asicrs
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup override set nightly

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            plugin/asicrs/target
          key: ${{ runner.os }}-asicrs-${{ hashFiles('plugin/asicrs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-asicrs-

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
