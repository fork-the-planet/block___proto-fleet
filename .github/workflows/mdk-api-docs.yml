name: MDK API Docs

on:
  push:
    branches: [main]
    paths:
      - proto-rig-api/openapi/MDK-API.json
      - proto-rig-api/openapi/redocly.yaml
      - proto-rig-api/openapi/build-docs.sh
      - proto-rig-api/openapi/logo.svg
      - .github/workflows/mdk-api-docs.yml
  pull_request:
    paths:
      - proto-rig-api/openapi/MDK-API.json
      - proto-rig-api/openapi/redocly.yaml
      - proto-rig-api/openapi/build-docs.sh
      - proto-rig-api/openapi/logo.svg
      - .github/workflows/mdk-api-docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Redoc site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 20
      - name: Render branded API docs
        run: bash proto-rig-api/openapi/build-docs.sh _site
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}proto-api-docs/
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
