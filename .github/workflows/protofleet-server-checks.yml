name: Server Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/protofleet-server-checks.yml"
      - ".github/actions/go-cache-setup/action.yml"
      - ".github/actions/hermit-setup/action.yml"
      - "bin/hermit.hcl"
      - "hermit-packages/**"
      - "go.work"
      - "go.work.sum"
      - "proto/**"
      - "server/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Hermit
        uses: ./.github/actions/hermit-setup

      - name: Configure Go cache
        uses: ./.github/actions/go-cache-setup

      - name: Check formatting
        run: golangci-lint fmt --diff -c .golangci.yaml

      - name: Lint
        run: just lint

      - name: Build
        run: just build

      - name: Start database
        run: just db-up

      - name: Test
        run: just test
