services:
  fleet-api:
    environment:
      AUTH_CLIENT_EXPIRATION_PERIOD: "24h"
      DB_NAME: "fleet"
      DB_ADDRESS: "timescaledb:5432"
      DB_USERNAME: "fleet"
      DB_PASSWORD: "fleet"
      DB_SSL_MODE: "disable"
      HTTP_LISTEN_ADDRESS: "0.0.0.0:4000"
      LOG_LEVEL: "INFO"
      FLEET_COMMAND_MAX_WORKERS: "500"
      FLEET_COMMAND_MASTER_POLLING_INTERVAL: "1s"
      FLEET_COMMAND_WORKER_EXECUTION_TIMEOUT: "30s"
      FLEET_COMMAND_BATCH_STATUS_UPDATE_POLLING_INTERVAL: "1s"
      FLEET_QUEUE_DEQUE_LIMIT: "500"
      FLEET_QUEUE_MAX_FAILURE_RETRIES: "5"
      FLEET_TELEMETRY_ENDPOINT: "http://otel-collector:4318"
      # HTTP_PPROF_ADDR: "0.0.0.0:6060"  # Uncomment to enable pprof debug server; port mapping below restricts access to host loopback only
      # ports:
      #   - "127.0.0.1:6060:6060"  # pprof debug server (requires HTTP_PPROF_ADDR=0.0.0.0:6060)
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # TimescaleDB (PostgreSQL with time-series extension)
  # Custom lightweight image (~123 MB) replacing timescale/timescaledb-ha (~1.67 GB)
  # Includes PostgreSQL 18, TimescaleDB, and timescaledb_toolkit — without HA bloat
  timescaledb:
    restart: always
    environment:
      POSTGRES_DB: "fleet"
      POSTGRES_USER: "fleet"
      POSTGRES_PASSWORD: "fleet"
    ports:
      - "5432:5432"
    # Docker's default 64MB /dev/shm is too small for parallel-query DSM segments
    shm_size: "${PG_SHM_SIZE:-256mb}"
    # PG_* variables come from a host profile env file selected at install time
    # (deployment-files/profiles/); defaults apply when no profile is loaded.
    # Command-line -c args outrank postgresql.conf, including values written
    # by timescaledb-tune at first init.
    command:
      - "postgres"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-300}"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-768MB}"
      - "-c"
      - "maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "checkpoint_timeout=${PG_CHECKPOINT_TIMEOUT:-5min}"
      - "-c"
      - "wal_buffers=${PG_WAL_BUFFERS:-16MB}"
      - "-c"
      - "wal_compression=${PG_WAL_COMPRESSION:-off}"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}"
      - "-c"
      - "effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-32MB}"
      - "-c"
      - "temp_file_limit=${PG_TEMP_FILE_LIMIT:--1}"
      - "-c"
      - "min_wal_size=${PG_MIN_WAL_SIZE:-1GB}"
      - "-c"
      - "max_wal_size=${PG_MAX_WAL_SIZE:-4GB}"
      # Worker slots must cover background workers + parallel workers + ~3
      # extras, or Timescale jobs starve ("out of background worker slots")
      - "-c"
      - "max_worker_processes=${PG_MAX_WORKER_PROCESSES:-19}"
      - "-c"
      - "max_parallel_workers_per_gather=${PG_MAX_PARALLEL_WORKERS_PER_GATHER:-4}"
      - "-c"
      - "max_parallel_workers=${PG_MAX_PARALLEL_WORKERS:-8}"
      - "-c"
      - "max_parallel_maintenance_workers=${PG_MAX_PARALLEL_MAINTENANCE_WORKERS:-4}"
      - "-c"
      - "timescaledb.max_background_workers=${PG_TS_MAX_BACKGROUND_WORKERS:-8}"
      - "-c"
      - "shared_preload_libraries=timescaledb,pg_stat_statements"
      # Utility statements can embed secrets (e.g. role provisioning DO
      # blocks carry passwords); keep them out of pg_stat_statements
      - "-c"
      - "pg_stat_statements.track_utility=off"
      - "-c"
      - "track_io_timing=${PG_TRACK_IO_TIMING:-on}"
      - "-c"
      - "log_min_duration_statement=${PG_LOG_MIN_DURATION_STATEMENT:-1000}"
      # Never log bind parameter values with slow statements: fleet-api binds
      # session tokens, password hashes, and credential ciphertext
      - "-c"
      - "log_parameter_max_length=0"
      - "-c"
      - "log_parameter_max_length_on_error=0"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
    healthcheck:
      test: [ "CMD-SHELL", "psql -U fleet -d fleet -c 'SELECT 1' > /dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fleet-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    command: [ "--config", "/etc/otelcol-contrib/config.yaml" ]
    expose:
      - "4317" # OTLP gRPC ingest
      - "4318" # OTLP HTTP ingest
      - "13133" # health_check extension (probed externally — see below)
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "4317" # OTLP gRPC ingest
      - "4318" # OTLP HTTP ingest
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:13.0
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      # Picked up by provisioning/datasources/timescaledb.yaml.
      GRAFANA_DB_NAME: "${DB_NAME:-fleet}"
      GRAFANA_DB_USERNAME: "${GRAFANA_DB_USERNAME:-grafana_ro}"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
      GF_PATHS_CONFIG: "/etc/grafana/grafana.ini"
      GF_FEATURE_TOGGLES_ENABLE: "provisioning"
    expose:
      - "3000"
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - monitoring
      - fleet-network

volumes:
  timescaledb-data:
  grafana-data:

networks:
  fleet-network:
    driver: bridge
  monitoring:
    driver: bridge
    internal: false
