# Proto Fleet alert rules — provisioned for Grafana's built-in alerting engine.

apiVersion: 1

groups:
  - orgId: 1
    name: proto-fleet-defaults
    folder: Proto Fleet
    interval: 30s
    rules:
      - uid: protofleet-device-offline
        title: Device Offline
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                SELECT
                    organization_id,
                    device_id,
                    1 AS value
                FROM notification_metric_sample
                WHERE metric = 'fleet_device_online'
                  AND time > NOW() - INTERVAL '10 minutes'
                GROUP BY organization_id, device_id
                HAVING last(value, time) = 0
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        for: 5m
        labels:
          # Shared default rule: proto_fleet_scope=shared makes it visible to every org
          # (ruleVisibleToOrg fails closed without it). A pause is still org-scoped, so one
          # org pausing it never affects another.
          proto_fleet_scope: shared
          severity: warning
          rule_group: proto-fleet-defaults
          template: offline
        annotations:
          summary: "Device is offline for at least five minutes."
          description: |
            Device {{ $labels.device_id }} (org {{ $labels.organization_id }})
            has been reporting fleet_device_online=0 for at least five minutes.

      - uid: protofleet-device-hashrate-low
        title: Device Hashrate Low
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                -- fleet_device_hashing is observed/expected hashrate (see metrics contract); the 0.75 threshold lives here so it can be retuned without redeploying fleet-api.
                SELECT
                    organization_id,
                    device_id,
                    1 AS value
                FROM notification_metric_sample
                WHERE metric = 'fleet_device_hashing'
                  AND time > NOW() - INTERVAL '10 minutes'
                GROUP BY organization_id, device_id
                HAVING last(value, time) < 0.75
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        # Longer than offline's 5m: hashrate dips transiently on pool reconnects and board resets, so a wider window avoids flapping.
        for: 10m
        labels:
          # proto_fleet_scope=shared makes the rule visible to every org; a pause stays org-scoped so one org never affects another.
          proto_fleet_scope: shared
          severity: warning
          rule_group: proto-fleet-defaults
          template: hashrate
        annotations:
          summary: "Device hashrate has fallen below expected for at least ten minutes."
          description: |
            Device {{ $labels.device_id }} (org {{ $labels.organization_id }})
            has been hashing below its expected rate for at least ten minutes.

      - uid: protofleet-device-temperature-high
        title: Device Temperature High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                WITH latest_per_kind AS (
                    SELECT
                        organization_id,
                        device_id,
                        sensor_kind,
                        last(value, time) AS latest_temp,
                        max(time) AS last_sample_time
                    FROM notification_metric_sample
                    WHERE metric = 'fleet_device_temperature_max_celsius'
                      AND time > NOW() - INTERVAL '10 minutes'
                    GROUP BY organization_id, device_id, sensor_kind
                )
                SELECT
                    organization_id,
                    device_id,
                    max(latest_temp) AS latest_temp
                FROM latest_per_kind
                -- Freshness gate: ignore a kind whose newest sample is stale, so a device that stopped reporting (e.g. went offline while hot) can't keep this firing on a reading it can no longer confirm — the Device Offline rule covers that case.
                -- Sized against the metrics writer's fixed 55s gauge heartbeat: this window must comfortably exceed heartbeat + poll spacing + flush. Do not tighten below 3 minutes without revisiting that cadence.
                WHERE last_sample_time > NOW() - INTERVAL '3 minutes'
                GROUP BY organization_id, device_id
                HAVING max(latest_temp) > 90
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        for: 10m
        labels:
          # Shared default rule: proto_fleet_scope=shared makes it visible to every org
          # (ruleVisibleToOrg fails closed without it). A pause is still org-scoped, so one
          # org pausing it never affects another.
          proto_fleet_scope: shared
          severity: warning
          rule_group: proto-fleet-defaults
          template: temperature
        annotations:
          summary: "Max sensor temperature for device is above 90C for ten minutes."
          description: |
            Maximum sensor temperature for device {{ $labels.device_id }}
            has been above 90C for at least ten minutes.

      - uid: protofleet-telemetry-poll-failure-rate
        title: Telemetry Poll Failure Rate High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                WITH poll_window AS (
                    SELECT organization_id, result, sum(value) AS total
                    FROM notification_metric_sample
                    WHERE metric = 'fleet_telemetry_poll_total'
                      AND time > NOW() - INTERVAL '10 minutes'
                    GROUP BY organization_id, result
                )
                SELECT
                    organization_id,
                    coalesce(failures.total, 0) - coalesce(successes.total, 0) AS value
                FROM (SELECT DISTINCT organization_id FROM poll_window) orgs
                LEFT JOIN (SELECT * FROM poll_window WHERE result = 'failure') failures
                    USING (organization_id)
                LEFT JOIN (SELECT * FROM poll_window WHERE result = 'success') successes
                    USING (organization_id)
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A > 0
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        for: 10m
        labels:
          # Shared default rule: proto_fleet_scope=shared makes it visible to every org
          # (ruleVisibleToOrg fails closed without it). A pause is still org-scoped, so one
          # org pausing it never affects another.
          proto_fleet_scope: shared
          severity: warning
          rule_group: proto-fleet-defaults
          template: telemetry-poll
        annotations:
          summary: "Telemetry polling is failing for the last ten minutes."
          description: |
            More telemetry polls are failing than succeeding for the
            last ten minutes. This typically indicates a fleet-wide
            connectivity or credential problem.

  # Own group so these evaluate every 10s: curtailment engages the moment the
  # source signals (or drops), so alert latency must track it closely.
  - orgId: 1
    name: proto-fleet-curtailment
    folder: Proto Fleet
    interval: 10s
    rules:
      - uid: protofleet-mqtt-curtailment-active
        title: Curtailment Active
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                -- fleet_mqtt_curtailment_active is re-emitted every ~10s while an
                -- MQTT-automation curtailment event is non-terminal (even for a source
                -- disabled mid-curtailment); kind carries the source name so each
                -- source alerts as its own instance.
                SELECT
                    organization_id,
                    kind,
                    1 AS value
                FROM notification_metric_sample
                WHERE metric = 'fleet_mqtt_curtailment_active'
                  AND time > NOW() - INTERVAL '10 minutes'
                GROUP BY organization_id, kind
                HAVING last(value, time) = 1
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        # Notify on the first evaluation that sees curtailment engage; the
        # resolved notification then marks miners restored.
        for: 0s
        labels:
          # Shared default rule: proto_fleet_scope=shared makes it visible to every org
          # (ruleVisibleToOrg fails closed without it). A pause is still org-scoped, so one
          # org pausing it never affects another.
          proto_fleet_scope: shared
          severity: info
          rule_group: proto-fleet-curtailment
          template: mqtt-curtailment
        annotations:
          summary: "Miners are curtailed by {{ $labels.kind }}"
          description: |
            Curtailment source {{ $labels.kind }} (org {{ $labels.organization_id }})
            has curtailed miners via its automation rule. This alert resolves
            once the miners are restored.

      - uid: protofleet-mqtt-source-disconnected
        title: Curtailment Source Unreachable
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                -- fleet_mqtt_source_connected is 0 while an enabled source has no
                -- subscribed broker connection. Disabling, removing, or renaming a
                -- source retires its series with one non-alerting sample (age-out
                -- of the 10-minute window below is the fallback after a restart).
                SELECT
                    organization_id,
                    kind,
                    1 AS value
                FROM notification_metric_sample
                WHERE metric = 'fleet_mqtt_source_connected'
                  AND time > NOW() - INTERVAL '10 minutes'
                GROUP BY organization_id, kind
                HAVING last(value, time) = 0
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A
        noDataState: OK
        # Fire on query error: the unscoped error row is operator-only (history is filtered by org), so orgs never see it and their pause stays complete.
        execErrState: Error
        # Three 10s evaluations: rides out a quick broker failover or worker
        # reconnect without flapping, but pages while a real outage is young —
        # the watchdog curtails miners as soon as the source goes silent.
        for: 30s
        labels:
          # Shared default rule: proto_fleet_scope=shared makes it visible to every org
          # (ruleVisibleToOrg fails closed without it). A pause is still org-scoped, so one
          # org pausing it never affects another.
          proto_fleet_scope: shared
          severity: critical
          rule_group: proto-fleet-curtailment
          template: mqtt-disconnected
        annotations:
          summary: "Curtailment source {{ $labels.kind }} is unreachable; cannot curtail."
          description: |
            Curtailment source {{ $labels.kind }} (org {{ $labels.organization_id }})
            has no subscribed MQTT broker connection, so curtailment signals
            cannot be received and miners can no longer be automatically
            curtailed or restored.

  - orgId: 1
    name: proto-fleet-self
    folder: Proto Fleet
    interval: 30s
    rules:
      - uid: protofleet-ingest-stalled
        title: Metric Ingest Stalled
        condition: B
        # Edge cases (full rationale in commit/PR):
        # Driven from presence + LEFT JOIN heartbeat: every org with pollable miners is evaluated; a missing bucket (cold-start / aged out) reads as stale and fires even if other orgs are healthy.
        # Per-org: removing an org's miners drops it from presence, so its stale heartbeat stops firing while other orgs are unaffected.
        # No pollable miners anywhere: UNION ALL sentinel returns a healthy row so noData can't fire on a fresh/emptied fleet.
        # Heartbeat lag (~1.5m from 30s refresh + 1m end_offset) is absorbed by the 5m threshold and 5m `for`.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: protofleet-timescaledb
            model:
              refId: A
              format: table
              rawSql: |
                SELECT
                    p.organization_id,
                    -- No bucket for a pollable org (cold-start or aged out) reads as stale so it fires per-org, not only when every org is missing.
                    COALESCE(extract(epoch from now() - max(h.bucket))::float8, 1e9) AS staleness_seconds
                FROM fleet_pollable_device_presence p
                LEFT JOIN fleet_telemetry_poll_heartbeat h
                    ON h.organization_id = p.organization_id
                    AND h.bucket > NOW() - INTERVAL '24 hours'
                GROUP BY p.organization_id
                UNION ALL
                -- No pollable miners anywhere: nothing to ingest, so emit a healthy sentinel instead of tripping noData.
                SELECT '', 0::float8
                WHERE NOT EXISTS (SELECT 1 FROM fleet_pollable_device_presence)
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: math
              expression: $A > 300
        noDataState: Alerting
        execErrState: Error
        for: 5m
        labels:
          # Operator-only, unlike the shared device rules above: this rule's
          # noDataState=Alerting path emits a single unscoped instance (no organization_id),
          # which an org-scoped pause/maintenance silence can never match. Exposing it per-org
          # would offer a Pause that reports success yet leaves the alert firing, so the
          # internal marker hides it from every org's rule list.
          proto_fleet_scope: internal
          severity: critical
          rule_group: proto-fleet-self
          component: metric-ingest
        annotations:
          summary: "Proto Fleet metric ingest has stalled."
          description: |
            No telemetry-poll samples have been ingested for organization
            {{ $labels.organization_id }} in the last five minutes, even
            though it has pollable miners. Either fleet-api is down or the
            in-process metrics writer is wedged. Alerts cannot fire until
            ingest resumes.
