# Contact points consumed by Grafana's built-in Alertmanager.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: protofleet-internal
    receivers:
      - uid: protofleet-internal-webhook
        type: webhook
        settings:
          url: http://fleet-api:4000/internal/alertmanager-webhook
          httpMethod: POST
          authorization_scheme: Bearer
          authorization_credentials: ${FLEET_ALERTS_WEBHOOK_TOKEN}
          # 0 = send every alert in a group: fleet-api batch-inserts and renders them, so a large
          # outage must not be truncated (which would silently drop alerts from history + delivery).
          maxAlerts: 0
        disableResolveMessage: false
