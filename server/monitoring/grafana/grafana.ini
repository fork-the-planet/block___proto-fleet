; Grafana configuration for the Proto Fleet notifications sidecar.

[security]
; The default admin password is rotated on first boot via the
; GF_SECURITY_ADMIN_PASSWORD env var injected by docker-compose. We
; do not allow embedded sign-up — operators land on an existing
; admin account.
disable_initial_admin_creation = false
allow_embedding = false

[users]
allow_sign_up = false

[analytics]
; Don't phone home to Grafana Labs from a Proto Fleet deployment.
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[unified_alerting]
enabled = true
; Match the polling cadence of the previous vmalert rules.
admin_config_poll_interval = 30s
alertmanager_config_poll_interval = 30s
ha_peer_timeout = 15s

[alerting]
; Legacy alerting is mutually exclusive with unified_alerting.
enabled = false

[log]
mode = console
level = info
