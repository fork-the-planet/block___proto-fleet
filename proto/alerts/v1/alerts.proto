syntax = "proto3";

package alerts.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service ChannelService {
    rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);

    rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);

    rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);

    rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);

    rpc TestChannel(TestChannelRequest) returns (TestChannelResponse);
}

service RuleService {
    rpc ListRules(ListRulesRequest) returns (ListRulesResponse);

    rpc PauseRule(PauseRuleRequest) returns (PauseRuleResponse);

    rpc ResumeRule(ResumeRuleRequest) returns (ResumeRuleResponse);

    rpc CreateRule(CreateRuleRequest) returns (CreateRuleResponse);

    rpc UpdateRule(UpdateRuleRequest) returns (UpdateRuleResponse);

    rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse);
}

service MaintenanceWindowService {
    rpc ListMaintenanceWindows(ListMaintenanceWindowsRequest) returns (ListMaintenanceWindowsResponse);
    rpc CreateMaintenanceWindow(CreateMaintenanceWindowRequest) returns (CreateMaintenanceWindowResponse);
    rpc UpdateMaintenanceWindow(UpdateMaintenanceWindowRequest) returns (UpdateMaintenanceWindowResponse);
    rpc DeleteMaintenanceWindow(DeleteMaintenanceWindowRequest) returns (DeleteMaintenanceWindowResponse);
}

service HistoryService {
    rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
}

enum ChannelKind {
    CHANNEL_KIND_UNSPECIFIED = 0;
    CHANNEL_KIND_WEBHOOK = 1;
    CHANNEL_KIND_SMTP = 2;
    CHANNEL_KIND_SLACK = 3;
}

enum ValidationState {
    VALIDATION_STATE_UNSPECIFIED = 0;
    VALIDATION_STATE_PENDING = 1;
    VALIDATION_STATE_OK = 2;
    VALIDATION_STATE_FAILED = 3;
}

message WebhookConfig {
    string url = 1;
    string bearer_header = 2;
    // Write-only: on update, revoke the stored bearer even when the destination is unchanged (an empty bearer_header alone means "keep").
    bool clear_bearer_header = 3;
}

message SmtpConfig {
    string host = 1;
    int32 port = 2;
    string username = 3;
    string from = 4;
    repeated string to = 5;
    string password = 6;
}

message SlackConfig {
    string webhook_url = 1;
}

message Channel {
    string id = 1;
    int64 organization_id = 2;
    string name = 3;
    ChannelKind kind = 4;
    WebhookConfig webhook = 5;
    SmtpConfig smtp = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
    google.protobuf.Timestamp validated_at = 9;
    ValidationState validation_state = 10;
    string validation_error = 11;
    bool has_secret = 12;
    SlackConfig slack = 13;
}

message ListChannelsRequest {}
message ListChannelsResponse {
    repeated Channel channels = 1;
}

message CreateChannelRequest {
    string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    ChannelKind kind = 2;
    WebhookConfig webhook = 3;
    SmtpConfig smtp = 4;
    SlackConfig slack = 5;
}
message CreateChannelResponse {
    Channel channel = 1;
}

message UpdateChannelRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
    string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
    ChannelKind kind = 3;
    WebhookConfig webhook = 4;
    SmtpConfig smtp = 5;
    SlackConfig slack = 6;
}
message UpdateChannelResponse {
    Channel channel = 1;
}

message DeleteChannelRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteChannelResponse {}

message TestChannelRequest {
    string id = 1;
    ChannelKind kind = 2;
    WebhookConfig webhook = 3;
    SmtpConfig smtp = 4;
    SlackConfig slack = 5;
}
message TestChannelResponse {
    bool ok = 1;
    string error = 2;
    int32 response_code = 3;
}

enum RuleTemplate {
    RULE_TEMPLATE_UNSPECIFIED = 0;
    RULE_TEMPLATE_OFFLINE = 1;
    RULE_TEMPLATE_HASHRATE = 2;
    RULE_TEMPLATE_TEMPERATURE = 3;
    RULE_TEMPLATE_POOL = 4;
    RULE_TEMPLATE_COMMAND_FAILURE = 5;
    RULE_TEMPLATE_TELEMETRY_POLL = 6;
    RULE_TEMPLATE_MQTT_CURTAILMENT = 7;
    RULE_TEMPLATE_MQTT_DISCONNECTED = 8;
}

// Origin decides mutability: only USER rules accept Update/DeleteRule.
enum RuleOrigin {
    RULE_ORIGIN_UNSPECIFIED = 0;
    RULE_ORIGIN_PROVISIONED = 1;
    RULE_ORIGIN_USER = 2;
}

enum HashrateMode {
    HASHRATE_MODE_UNSPECIFIED = 0;
    HASHRATE_MODE_PCT_EXPECTED = 1;
    HASHRATE_MODE_ABSOLUTE = 2;
}

enum HashrateUnit {
    HASHRATE_UNIT_UNSPECIFIED = 0;
    HASHRATE_UNIT_TERAHASH = 1;
    HASHRATE_UNIT_PETAHASH = 2;
}

// Fires when a device reports offline for the configured duration.
message OfflineConfig {}

message HashrateConfig {
    HashrateMode mode = 1;
    // Percent of expected in (0, 100] for PCT_EXPECTED; hashrate in `unit` for ABSOLUTE.
    double value = 2 [(buf.validate.field).double.gt = 0];
    // ABSOLUTE mode only.
    HashrateUnit unit = 3;
}

message TemperatureConfig {
    // Clients convert Fahrenheit before sending.
    double max_celsius = 1 [(buf.validate.field).double = {gt: 0, lte: 150}];
}

// User-specified rule definition; the server compiles it into the backing Grafana rule.
message RuleConfig {
    // 190 is Grafana's alert-rule title cap.
    string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 190}];
    int32 duration_seconds = 2 [(buf.validate.field).int32 = {gte: 60, lte: 86400}];
    oneof template_config {
        option (buf.validate.oneof).required = true;
        OfflineConfig offline = 3;
        HashrateConfig hashrate = 4;
        TemperatureConfig temperature = 5;
    }
}

message Rule {
    string id = 1;
    int64 organization_id = 2;
    string name = 3;
    RuleTemplate template = 4;
    string group = 5;
    string severity = 6;
    string summary = 7;
    string description = 8;
    int32 duration_seconds = 9;
    bool enabled = 10;
    RuleOrigin origin = 11;
    // Populated for USER rules only; round-trips into the edit form.
    RuleConfig config = 12;
}

message ListRulesRequest {}
message ListRulesResponse {
    repeated Rule rules = 1;
}

message CreateRuleRequest {
    RuleConfig config = 1 [(buf.validate.field).required = true];
}
message CreateRuleResponse {
    Rule rule = 1;
}

message UpdateRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
    RuleConfig config = 2 [(buf.validate.field).required = true];
}
message UpdateRuleResponse {
    Rule rule = 1;
}

message DeleteRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteRuleResponse {}

message PauseRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message PauseRuleResponse {
    Rule rule = 1;
}

message ResumeRuleRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message ResumeRuleResponse {
    Rule rule = 1;
}

enum MaintenanceWindowScopeKind {
    MAINTENANCE_WINDOW_SCOPE_KIND_UNSPECIFIED = 0;
    MAINTENANCE_WINDOW_SCOPE_KIND_RULE = 1;
    MAINTENANCE_WINDOW_SCOPE_KIND_GROUP = 2;
    MAINTENANCE_WINDOW_SCOPE_KIND_SITE = 3;
    MAINTENANCE_WINDOW_SCOPE_KIND_DEVICE = 4;
}

message MaintenanceWindowScope {
    MaintenanceWindowScopeKind kind = 1;
    string rule_id = 2;
    string group_id = 3;
    string site_id = 4;
    repeated string device_ids = 5;
}

message MaintenanceWindow {
    string id = 1;
    int64 organization_id = 2;
    MaintenanceWindowScope scope = 3;
    google.protobuf.Timestamp starts_at = 4;
    google.protobuf.Timestamp ends_at = 5;
    string comment = 6;
    string created_by = 7;
    google.protobuf.Timestamp created_at = 8;
    bool active = 9;
}

message ListMaintenanceWindowsRequest {}
message ListMaintenanceWindowsResponse {
    repeated MaintenanceWindow maintenance_windows = 1;
}

message CreateMaintenanceWindowRequest {
    MaintenanceWindowScope scope = 1;
    google.protobuf.Timestamp starts_at = 2;
    google.protobuf.Timestamp ends_at = 3;
    string comment = 4 [(buf.validate.field).string.max_len = 1024];
}
message CreateMaintenanceWindowResponse {
    MaintenanceWindow maintenance_window = 1;
}

message UpdateMaintenanceWindowRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
    MaintenanceWindowScope scope = 2;
    google.protobuf.Timestamp starts_at = 3;
    google.protobuf.Timestamp ends_at = 4;
    string comment = 5 [(buf.validate.field).string.max_len = 1024];
}
message UpdateMaintenanceWindowResponse {
    MaintenanceWindow maintenance_window = 1;
}

message DeleteMaintenanceWindowRequest {
    string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteMaintenanceWindowResponse {}

message AlertHistoryEntry {
    string id = 1;
    google.protobuf.Timestamp received_at = 2;
    string alert_name = 3;
    string status = 4;
    string severity = 5;
    string rule_group = 6;
    string fingerprint = 7;
    string device_id = 8;
    string device_name = 9;
    string device_mac = 10;
    string template = 11;
    string summary = 12;
    google.protobuf.Timestamp starts_at = 13;
    google.protobuf.Timestamp ends_at = 14;
}

message ListAlertsRequest {
    string before_id = 1;
    int32 page_size = 2 [(buf.validate.field).int32.gte = 0];
    // When set, return only currently-active alerts (latest row per fingerprint still firing); before_id is ignored.
    bool active_only = 3;
}
message ListAlertsResponse {
    repeated AlertHistoryEntry alerts = 1;
    bool has_more = 2;
}
