syntax = "proto3";

package pairing.v1;

import "buf/validate/validate.proto";
import "capabilities/v1/capabilities.proto";
import "common/v1/cooling.proto";
import "curtailment/v1/curtailment.proto";
import "minercommand/v1/command.proto";

// Device represents a discovered network device that can be paired with the system
message Device {
  // unique identifier of the device
  string device_identifier = 1;

  // IP address of the device (IPv4 or IPv6)
  string ip_address = 2;

  // Port number where the device's service is running
  string port = 3;

  // MAC address of the device (format: XX:XX:XX:XX:XX:XX)
  string mac_address = 4;

  // Serial number of the control board of the unit
  string serial_number = 5;

  // Model name/number of the device
  string model = 6;

  // Name of the device manufacturer
  string manufacturer = 7;

  // URL scheme of the device's web interface
  string url_scheme = 8;

  reserved 9;
  reserved "type";

  // Capabilities of the device
  capabilities.v1.MinerCapabilities capabilities = 10;

  // Firmware version (available after discovery/pairing)
  string firmware_version = 11;

  // Driver name identifies which plugin handles this device (e.g., "proto", "antminer").
  // Used for plugin routing; distinct from type which describes hardware identity.
  string driver_name = 12;
}

// Represents login credentials used for device pairing
message Credentials {
  string username = 1;
  optional string password = 2;
}

// Configuration for mDNS-based device discovery
message MDNSModeRequest {
  // Service type to discover (e.g., "_fleet._tcp")
  // Format: _servicename._protocol
  string service_type = 1;

  // Domain to search in (typically "local")
  string domain = 2;

  // How long to search for devices, in seconds
  int32 timeout_seconds = 3;
}

// Configuration for Nmap-based network scanning discovery
message NmapModeRequest {
  // Target specification for scan
  // Can be: single IP (192.168.1.1), hostname (device.local),
  // IPv4 subnet (192.168.1.0/24), or IP range (192.168.1.1-10).
  // IPv6 subnet scanning is not supported; use mDNS or IP list for IPv6 devices.
  string target = 1;

  // Optional ports to scan. When omitted, the server derives canonical scan ports
  // from loaded plugin metadata. If provided, these ports fully override the
  // server-derived defaults.
  repeated string ports = 2 [(buf.validate.field).repeated.max_items = 256];
}

// Configuration for IP range-based device discovery
message IPRangeModeRequest {
  // Starting IP address of the range to scan
  string start_ip = 1;

  // Ending IP address of the range to scan
  string end_ip = 2;

  // Optional ports to check on each IP address. When omitted, the server derives
  // canonical scan ports from loaded plugin metadata. If provided, these ports
  // fully override the server-derived defaults.
  repeated string ports = 3 [(buf.validate.field).repeated.max_items = 256];
}

// Configuration for discovering devices from a specific list of IP addresses
message IPListModeRequest {
  // List of IP addresses (IPv4, IPv6, or hostnames) to check
  repeated string ip_addresses = 1 [(buf.validate.field).repeated.max_items = 4096];

  // Optional ports to check on each IP address. When omitted, the server derives
  // canonical scan ports from loaded plugin metadata. If provided, these ports
  // fully override the server-derived defaults.
  repeated string ports = 2 [(buf.validate.field).repeated.max_items = 256];
}

// Request message for device discovery, supporting multiple discovery modes
message DiscoverRequest {
  // Only one discovery mode can be active at a time
  oneof mode {
    IPListModeRequest ip_list = 1;    // Discover from list of IPs
    IPRangeModeRequest ip_range = 2;  // Discover in IP range
    MDNSModeRequest mdns = 3;         // Discover using mDNS
    NmapModeRequest nmap = 4;         // Discover using Nmap
  }
}

// Response message containing discovered devices or errors
message DiscoverResponse {
  // List of devices discovered in this response
  repeated Device devices = 1;

  // Error message if discovery failed
  // Empty if discovery was successful
  string error = 2;
}

// AgentCommand is the typed envelope marshaled into ControlCommand.payload so a
// fleet node can tell command kinds apart rather than assuming a bare
// DiscoverRequest. command_id stays on the transport-level
// ControlCommand/ControlAck and is not duplicated here.
//
// Field numbers are shared across efforts so the discovery payload is migrated
// into this envelope exactly once and later arms are purely additive:
//   2 = FleetNodePairRequest pair    (fleet-node pairing path)
//   3 = MinerCommand miner_command   (per-miner command path)
message AgentCommand {
  oneof command {
    option (buf.validate.oneof).required = true;

    DiscoverRequest discover = 1;
    FleetNodePairRequest pair = 2;
    MinerCommand miner_command = 3;
  }
}

// MinerConnectionDescriptor tells a fleet node how to reach one of its local
// miners. The cloud supplies it per command because the node holds no device DB.
message MinerConnectionDescriptor {
  string device_identifier = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  // Plugin routing key (e.g. "antminer", "virtual"); selects the node-side driver.
  string driver_name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
  string ip_address = 3 [(buf.validate.field).string = {min_len: 1, max_len: 45, ip: true}];
  string port = 4 [
    (buf.validate.field).string = {min_len: 1, max_len: 5},
    (buf.validate.field).cel = {
      id: "port.range",
      message: "port must be a decimal number in 1..65535",
      expression: "this.matches('^[1-9][0-9]*$') && int(this) <= 65535"
    }
  ];
  string url_scheme = 5 [(buf.validate.field).string.max_len = 32];
  string serial_number = 6 [(buf.validate.field).string.max_len = 255];
  string mac_address = 7 [(buf.validate.field).string.max_len = 255];
  // Opaque, encrypted miner credential the node decrypts just-in-time with its
  // per-org key (empty for no-secret drivers like the virtual driver). The cloud
  // never ships plaintext down the stream; see RFC 0001.
  bytes credential = 8 [(buf.validate.field).bytes.max_len = 8192];
}

// MinerCommand is one operator command targeting a single fleet-node-paired miner,
// carried in AgentCommand.miner_command. The node reconstructs a local device from
// `target` and executes the selected action, then acks the outcome.
message MinerCommand {
  MinerConnectionDescriptor target = 1 [(buf.validate.field).required = true];

  oneof action {
    option (buf.validate.oneof).required = true;

    RebootAction reboot = 2;
    StartMiningAction start_mining = 3;
    StopMiningAction stop_mining = 4;
    BlinkLedAction blink_led = 5;
    CurtailAction curtail = 6;
    UncurtailAction uncurtail = 7;
    SetCoolingModeAction set_cooling_mode = 8;
    SetPowerTargetAction set_power_target = 9;
  }
}

message RebootAction {}
message StartMiningAction {}
message StopMiningAction {}
message BlinkLedAction {}
message UncurtailAction {}

message CurtailAction {
  curtailment.v1.CurtailmentLevel level = 1;
}

message SetCoolingModeAction {
  common.v1.CoolingMode mode = 1;
}

message SetPowerTargetAction {
  minercommand.v1.PerformanceMode performance_mode = 1;
}

// Request to pair with discovered devices
message PairRequest {
  // Credentials for device authentication
  Credentials credentials = 1;
  // Device selector specifies which devices to pair
  minercommand.v1.DeviceSelector device_selector = 2;
}

// Response to pairing request
// Empty message as success/failure is indicated by gRPC status
message PairResponse {
  repeated string failed_device_ids = 1;
}

// FleetNodePairRequest asks a fleet node to pair (authenticate) a batch of
// devices it previously discovered. The node has no database, so the server
// supplies each target's endpoint and driver.
message FleetNodePairRequest {
  repeated FleetNodePairTarget targets = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 1024}];

  // Applied to basic-auth targets in the batch; omitted for asymmetric-auth
  // drivers, which pair with the node's own miner-signing key.
  Credentials credentials = 2;
}

message FleetNodePairTarget {
  string device_identifier = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  string ip_address        = 2 [(buf.validate.field).string = {min_len: 1, max_len: 45, ip: true}];
  string port              = 3 [
    (buf.validate.field).string = {min_len: 1, max_len: 5},
    (buf.validate.field).cel = {
      id: "port.range",
      message: "port must be a decimal number in 1..65535",
      expression: "this.matches('^[1-9][0-9]*$') && int(this) <= 65535"
    }
  ];
  string url_scheme  = 4 [(buf.validate.field).string.max_len = 32];
  string driver_name = 5 [(buf.validate.field).string = {min_len: 1, max_len: 50}];

  // Carried so the node can look up plugin default credentials (keyed on
  // manufacturer + firmware) without a database.
  string manufacturer     = 6 [(buf.validate.field).string.max_len = 255];
  string firmware_version = 7 [(buf.validate.field).string.max_len = 255];
}

// Service for discovering and pairing with network devices
service PairingService {
  // Discovers devices on the network using the specified discovery mode
  // Streams results as devices are found
  rpc Discover(DiscoverRequest) returns (stream DiscoverResponse);

  // Initiates pairing with one or more discovered devices
  rpc Pair(PairRequest) returns (PairResponse);
}
