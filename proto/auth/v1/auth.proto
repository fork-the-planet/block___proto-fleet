syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";

// AuthService provides authentication and user credential management functionality
service AuthService {
    // Authenticate validates user credentials and creates a session
    // Returns session information and sets a session cookie for subsequent requests
    rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);

    // Logout invalidates the current session
    rpc Logout(LogoutRequest) returns (LogoutResponse);

    // UpdatePassword changes a user's password after verifying their current password
    // Returns an error if the current password is incorrect
    // The user must be authenticated to use this endpoint
    rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);

    rpc UpdateUsername(UpdateUsernameRequest) returns (UpdateUsernameResponse);

    rpc GetUserAuditInfo(GetUserAuditInfoRequest) returns (GetUserAuditInfoResponse);

    // CreateUser creates a new user account with a system-generated temporary password (Super Admin only)
    // The temporary password is only returned once and must be shared with the new user
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

    // ListUsers returns all active users in the organization (Super Admin only)
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // ResetUserPassword generates a new temporary password for an existing user (Super Admin only)
    // The temporary password is only returned once and must be shared with the user
    rpc ResetUserPassword(ResetUserPasswordRequest) returns (ResetUserPasswordResponse);

    // DeactivateUser performs a soft delete on a user account (Super Admin only)
    // Users cannot deactivate themselves
    rpc DeactivateUser(DeactivateUserRequest) returns (DeactivateUserResponse);

    // VerifyCredentials verifies the provided username and password match the current session user,
    // without creating a new session. Used for step-up authentication on sensitive operations
    // (e.g., editing pools, managing security). Both username and password must match the
    // authenticated session user; mismatched or invalid credentials are rejected.
    rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
}

message AuthenticateRequest {
    // Username of the user attempting to authenticate
    string username = 1;

    // Password for the user account
    string password = 2;
}

message AuthenticateResponse {
    // Authenticated user information
    // Contains user_id, username, role, password change requirements, and audit timestamps
    UserInfo user_info = 1;

    // Unix timestamp (in seconds) indicating when the session will expire
    // Session expiry is extended on each request (sliding window)
    int64 session_expiry = 2;
}

message LogoutRequest {
}

message LogoutResponse {
}

enum AuthenticateErrorCode {
    AUTHENTICATE_ERROR_CODE_UNSPECIFIED = 0;
    AUTHENTICATE_ERROR_CODE_INVALID_USER_OR_PASSWORD = 1;
}

message UpdatePasswordRequest {
    // Current password for the user account
    // Must match the user's existing password
    string current_password = 1;

    // New password for the user account
    string new_password = 2;
}

message UpdatePasswordResponse {
    // Empty response as success/failure is indicated by gRPC status
    // A successful response indicates the password was changed
}

message UpdateUsernameRequest {
    string username = 1;
}

message UpdateUsernameResponse {
}

enum UpdatePasswordErrorCode {
    UPDATE_PASSWORD_ERROR_CODE_UNSPECIFIED = 0;
    UPDATE_PASSWORD_ERROR_CODE_INVALID_OLD_PASSWORD = 1;
    UPDATE_PASSWORD_ERROR_CODE_NEW_PASSWORD_SAME_AS_OLD_PASSWORD = 2;
}

message GetUserAuditInfoRequest {
}

message UserAuditInfo {
    google.protobuf.Timestamp password_updated_at = 1;
}

message GetUserAuditInfoResponse {
    UserAuditInfo info = 1;
}

message CreateUserRequest {
    // Username for the new user account
    // Must be unique within the system
    string username = 1;

    // Role id to assign to the new user. Required — the server rejects an
    // empty value with InvalidArgument rather than picking a default, so a
    // missing role can never silently mint an admin account. SUPER_ADMIN
    // is also rejected (ownership transfer is a separate flow).
    string role_id = 2;
}

message CreateUserResponse {
    // Unique identifier for the created user
    string user_id = 1;

    // Username of the created user
    string username = 2;

    // Temporary password generated by the system
    // This is only returned once and will not be accessible again
    string temporary_password = 3;
}

message ListUsersRequest {
}

message UserInfo {
    // Unique identifier for the user
    string user_id = 1;

    // Username of the user
    string username = 2;

    // Timestamp when the user's password was last updated
    google.protobuf.Timestamp password_updated_at = 3;

    // Timestamp when the user last logged in
    // May be null if the user has never logged in
    google.protobuf.Timestamp last_login_at = 4;

    // Role name. Retained for backward compatibility while the client
    // migrates to the `permissions` field below; intended to be retired
    // once every UI gate uses `hasPermission(...)` checks.
    string role = 5;

    // Indicates whether the user must change their password
    bool requires_password_change = 6;

    // Effective permission keys for the caller, sorted. Populated only
    // when the UserInfo represents the caller's own identity (e.g. the
    // Authenticate response). Other surfaces that return UserInfo for
    // peer users (ListUsers) leave this empty: per-user permission
    // queries belong on a dedicated authz RPC, not bundled into peer
    // listing where they would leak authority across the org.
    repeated string permissions = 7;
}

message ListUsersResponse {
    repeated UserInfo users = 1;
}

message ResetUserPasswordRequest {
    // Unique identifier of the user whose password should be reset
    string user_id = 1;
}

message ResetUserPasswordResponse {
    // New temporary password generated by the system
    // This is only returned once and will not be accessible again
    string temporary_password = 1;
}

message DeactivateUserRequest {
    // Unique identifier of the user to deactivate
    string user_id = 1;
}

message DeactivateUserResponse {
}

message VerifyCredentialsRequest {
    // Username — must match the currently authenticated session user
    string username = 1;

    // Password for the currently authenticated user
    string password = 2;
}

message VerifyCredentialsResponse {
}

enum UserManagementErrorCode {
    USER_MANAGEMENT_ERROR_CODE_UNSPECIFIED = 0;
    USER_MANAGEMENT_ERROR_CODE_UNAUTHORIZED = 1;
    USER_MANAGEMENT_ERROR_CODE_USERNAME_EXISTS = 2;
    USER_MANAGEMENT_ERROR_CODE_CANNOT_DEACTIVATE_SELF = 3;
}
